version: "3.9"

services:
  api:
    build: .
    container_name: dparis_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./static:/app/static
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: dparis_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: dparis_db
      MYSQL_USER: dparis
      MYSQL_PASSWORD: dparis123
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: dparis_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db

volumes:
  mysql_data:
