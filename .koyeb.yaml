name: dparis-egsotis
services:
  - name: backend
    type: web
    ports:
      - port: 7860
        protocol: http
    env:
      - key: DATABASE_URL
        value: sqlite:///./dparis.db
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 7860
    builder: docker
    dockerfile: backend/Dockerfile
    context: backend
    regions:
      - fra # Frankfurt (European region usually has good free tier availability)
    instance_type: nano
